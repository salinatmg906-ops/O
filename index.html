<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Bhatti</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: #fff;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
  background: linear-gradient(135deg, #ff416c, #ff4b2b);
}

.hero h1 {
  margin: 0;
  font-size: 36px;
}

.hero p {
  margin-top: 10px;
  color: #f1f1f1;
}

/* SECTION */
.section {
  padding: 30px 20px;
}

.section h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* CARD */
.card {
  background: #1a1a1a;
  border-radius: 20px;
  overflow: hidden;
  margin-bottom: 20px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.6);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 12px 30px rgba(0,0,0,0.9);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card h3 {
  margin: 15px;
}

.card p {
  margin: 0 15px 20px;
  color: #bbb;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  background: #000;
  color: #888;
  font-size: 14px;
}
</style>

</head>
<body>

<!-- HERO -->
<div class="hero">
  <h1>Modern Bhatti</h1>
  <p>Delicious Food • Fast Service • Best Taste</p>
</div>

<!-- SECTION -->
<div class="section">
  <h2>Our Popular Dishes</h2>

  <!-- BBQ -->
  <div class="card">
    <img src="images/bbq.jpg" alt="BBQ">
    <h3>Grilled BBQ</h3>
    <p>Juicy grilled skewers with smoky flavor</p>
  </div>

  <!-- MOMO -->
  <div class="card">
    <img src="images/momo.jpg" alt="Momo">
    <h3>Momo</h3>
    <p>Steamed dumplings with spicy chutney</p>
  </div>

  <!-- CHOWMEIN -->
  <div class="card">
    <img src="images/chowmein.jpg" alt="Chowmein">
    <h3>Chowmein</h3>
    <p>Stir-fried noodles with fresh veggies</p>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 Modern Bhatti | All Rights Reserved
</div>

</body>
</html>
