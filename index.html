<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Bhatti</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0d0d0d;
  color: #fff;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('images/hero.jpg') center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  font-size: 40px;
}

.hero p {
  margin: 10px 0;
}

button {
  padding: 12px 25px;
  border: none;
  background: red;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff4444;
}

/* SECTION */
.section {
  padding: 50px 20px;
  text-align: center;
}

h2 {
  margin-bottom: 20px;
}

/* MENU */
.menu p {
  font-size: 18px;
  margin: 10px 0;
}

/* GALLERY */
.gallery {
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
}

.gallery img {
  width: 150px;
  border-radius: 10px;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
}

/* CONTACT */
.contact p {
  margin: 10px 0;
}

/* MAP */
iframe {
  width: 100%;
  height: 200px;
  border: none;
  margin-top: 20px;
}

/* WHATSAPP BUTTON */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  padding: 15px;
  border-radius: 50%;
  font-size: 20px;
  text-decoration: none;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background: #111;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>🍽️ Modern Bhatti</h1>
  <p>Best Local Restaurant in Machhapokhari</p>

  <a href="tel:9800000000">
    <button>Call Now</button>
  </a>
</div>

<!-- ABOUT -->
<div class="section">
  <h2>About Us</h2>
  <p>We serve fresh and delicious Nepali food with high quality ingredients.</p>
</div>

<!-- MENU -->
<div class="section menu">
  <h2>Our Menu</h2>
  <p>🥟 Momo – Rs 120</p>
  <p>🍜 Chowmein – Rs 150</p>
  <p>🍛 Thakali Set – Rs 350</p>
</div>

<!-- GALLERY -->
<div class="section">
  <h2>Gallery</h2>
  <div class="gallery">
    <img src="images/food1.jpg">
    <img src="images/food2.jpg">
    <img src="images/food3.jpg">
  </div>
</div>

<!-- CONTACT -->
<div class="section contact">
  <h2>Contact Us</h2>
  <p>📍 Machhapokhari, Kathmandu</p>
  <p>📞 9800000000</p>

  <!-- MAP -->
  <iframe src="https://www.google.com/maps?q=Machhapokhari,Kathmandu&output=embed"></iframe>
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/9800000000" class="whatsapp">💬</a>

<!-- FOOTER -->
<footer>
  © 2026 Modern Bhatti
</footer>

</body>
</html>
