<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Bhatti</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
  background: url('https://images.unsplash.com/photo-1604908176997-125f25cc6f3d') center/cover;
}

.hero h1 {
  font-size: 40px;
}

.hero button {
  padding: 12px 25px;
  margin-top: 20px;
  border: none;
  background: red;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* SECTION */
.section {
  padding: 40px 20px;
  text-align: center;
}

.menu-item {
  margin: 10px 0;
}

/* GALLERY */
.gallery img {
  width: 30%;
  margin: 5px;
  border-radius: 10px;
}

/* FOOTER */
.footer {
  background: #000;
  padding: 20px;
  text-align: center;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>🍽️ Modern Bhatti</h1>
  <p>Best Local Restaurant in Machhapokhari</p>
  <button>Call Now</button>
</div>

<!-- ABOUT -->
<div class="section">
  <h2>About Us</h2>
  <p>We serve fresh and delicious Nepali food with high quality ingredients.</p>
</div>

<!-- MENU -->
<div class="section">
  <h2>Our Menu</h2>
  <div class="menu-item">🥟 Momo – Rs 120</div>
  <div class="menu-item">🍜 Chowmein – Rs 150</div>
  <div class="menu-item">🍛 Thakali Set – Rs 350</div>
</div>

<!-- GALLERY -->
<div class="section gallery">
  <h2>Gallery</h2>
  <img src="https://images.unsplash.com/photo-1604908554025-2d1e9f8fbbf4">
  <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
  <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
</div>

<!-- CONTACT -->
<div class="section">
  <h2>Contact Us</h2>
  <p>📍 Machhapokhari, Kathmandu</p>
  <p>📞 98XXXXXXXX</p>
</div>

<!-- FOOTER -->
<div class="footer">
  <p>© 2026 Modern Bhatti</p>
</div>

</body>
</html>
